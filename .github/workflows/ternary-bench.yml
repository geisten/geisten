name: ternary-bench

# Ternary (BitNet b1.58 / TQ2_0) throughput on a FREE ARM64 runner
# (Ampere Altra / Neoverse N1: ARMv8.2, has SDOT/asimddp, NO i8mm — the same
# ISA *class* as the Raspberry Pi 5's Cortex-A76 for these kernels). This is a
# proxy, NOT the Pi: N1 is a server core with a different cache/memory subsystem,
# so absolute numbers and the exact SDOT/TL1 crossover differ. The Pi 5 stays the
# final arbiter (benchmark/compare_ternary_pi5.sh). What this DOES give: a real,
# free, reproducible geist-vs-llama.cpp comparison on the correct ISA, so kernel
# work is data-driven instead of blind.

on:
  workflow_dispatch:
    inputs:
      seq_lens:
        description: "prefill lengths (comma list)"
        default: "128,256"
      decode_n:
        description: "decode steps"
        default: "64"
      repeats:
        description: "measured repeats (mean)"
        default: "5"

jobs:
  bench:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Show CPU (confirm SDOT present, i8mm absent)
        run: |
          nproc
          lscpu | sed -n '1,20p' || true
          echo "Features:"; grep -m1 -i "Features" /proc/cpuinfo || true
          echo "asimddp (SDOT):"; grep -m1 -o "asimddp" /proc/cpuinfo || echo "MISSING"
          echo "i8mm:"; grep -m1 -o "i8mm" /proc/cpuinfo || echo "absent (expected — matches A76)"

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 libopenblas-dev cmake git curl ca-certificates

      - name: Build geist (linux ARM64, OpenBLAS+OpenMP)
        run: |
          make TARGET=linux CC=gcc-14 bin/linux/release/tests/bench_perf_sweep

      - name: Fetch a public ternary model (BitNet large, TQ2_0, 217 MB)
        run: |
          mkdir -p m
          curl -sL --retry 3 -o m/bitnet-large-TQ2_0.gguf \
            https://huggingface.co/gianni-cor/bitnet_b1_58-large-TQ2_0/resolve/main/bitnet_b1_58-large-TQ2_0.gguf
          ls -la m/

      - name: geist ternary — SDOT (default) and TL1
        env:
          GEIST_WEIGHT_MMAP: "1"
          OMP_WAIT_POLICY: active
        run: |
          B=bin/linux/release/tests/bench_perf_sweep
          M=m/bitnet-large-TQ2_0.gguf
          SL='${{ inputs.seq_lens }}'; DN='${{ inputs.decode_n }}'; R='${{ inputs.repeats }}'
          echo "### geist SDOT"
          OMP_NUM_THREADS=4 $B --gguf $M --seq-lens $SL --decode-n $DN --warmup $DN --repeats $R | tee geist-sdot.jsonl
          echo "### geist SDOT, 3 threads (decode is BW-bound)"
          OMP_NUM_THREADS=3 $B --gguf $M --seq-lens $SL --decode-n $DN --warmup $DN --repeats $R | tee geist-sdot-t3.jsonl
          echo "### geist TL1"
          GEIST_TL1=1 OMP_NUM_THREADS=4 $B --gguf $M --seq-lens $SL --decode-n $DN --warmup $DN --repeats $R | tee geist-tl1.jsonl

      - name: Build llama.cpp (OpenBLAS) and bench the SAME model
        run: |
          git clone --depth 1 https://github.com/ggml-org/llama.cpp llama.cpp
          cmake -S llama.cpp -B llama.cpp/build \
            -DGGML_BLAS=ON -DGGML_BLAS_VENDOR=OpenBLAS -DGGML_NATIVE=ON \
            -DLLAMA_CURL=OFF -DBUILD_SHARED_LIBS=OFF >/dev/null
          cmake --build llama.cpp/build --target llama-bench -j"$(nproc)" >/dev/null
          M=m/bitnet-large-TQ2_0.gguf
          SL='${{ inputs.seq_lens }}'; DN='${{ inputs.decode_n }}'; R='${{ inputs.repeats }}'
          echo "### llama.cpp llama-bench (if it loads this arch=bitnet TQ2_0 model)"
          ./llama.cpp/build/bin/llama-bench -m $M -p $SL -n $DN -t 4 -r $R 2>&1 | tee llama.txt \
            || echo "NOTE: llama.cpp could not bench this model (arch/quant load) — see log above"

      - name: Summary
        if: always()
        run: |
          echo "## geist (mean tps) — real ARM SDOT/no-i8mm (N1, proxy for A76)" >> $GITHUB_STEP_SUMMARY
          ex() { sed -nE 's/.*"seq_len":([0-9]+).*"prefill_tps":([0-9.]+).*"decode_tps":([0-9.]+).*/| \1 | \2 | \3 |/p' "$1"; }
          {
            echo "| seq | prefill tps | decode tps |"; echo "|--:|--:|--:|"
            echo "**SDOT t4**";  ex geist-sdot.jsonl
            echo "**SDOT t3**";  ex geist-sdot-t3.jsonl
            echo "**TL1 t4**";   ex geist-tl1.jsonl
          } >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## llama.cpp (raw llama-bench)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat llama.txt 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "(no llama output)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ternary-bench-results
          path: |
            geist-*.jsonl
            llama.txt
