name: Release

# Build self-contained per-platform `geist` CLI artifacts (ROADMAP.md Step 4).
# v0.1 ships ARM64 — the platforms geist is fast on today. x86-64 / Windows wait
# for the AVX backend (Step 5). Runs on a version tag, or manually for a dry run
# (artifacts are uploaded either way; a tag also attaches them to the Release).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # attach assets to the GitHub Release on a tag

jobs:
  linux-arm64:
    name: linux-arm64 (musl-static, dependency-free)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      # Build fully static against **musl** (not glibc): the result has literally
      # no libc dependency, is more portable than a glibc -static binary (no NSS /
      # glibc-version quirks), and is much smaller. Alpine 3.21 ships gcc 14
      # (needed for -std=c23) and a musl-built libgomp for OpenMP. The host job
      # stays on ubuntu-arm so checkout / upload-artifact (Node actions) work;
      # only the compile runs in the container, writing into the mounted volume.
      # GEIST_BLAS_FREE=1 -> native NEON fp32 + vendored FFT (no OpenBLAS/FFTW).
      # EXTRA_LDFLAGS "-static -s": fully static + strip symbols at link time.
      - name: Build (musl-static in Alpine, stripped)
        run: |
          docker run --rm -v "$PWD:/src" -w /src alpine:3.21 sh -c '
            set -e
            apk add --no-cache build-base linux-headers
            make TARGET=linux CC=gcc GEIST_BLAS_FREE=1 \
                 EXTRA_CFLAGS=-D_GNU_SOURCE EXTRA_LDFLAGS="-static -s" \
                 bin/linux/release/tools/geist
          '
      - name: Verify self-contained + runs
        run: |
          file bin/linux/release/tools/geist
          ldd bin/linux/release/tools/geist || echo "(static: not a dynamic executable — good)"
          bin/linux/release/tools/geist --version
          ls -l bin/linux/release/tools/geist
      - name: Package
        run: |
          mkdir -p dist/geist-linux-arm64
          cp bin/linux/release/tools/geist dist/geist-linux-arm64/
          cp README.md LICENSE dist/geist-linux-arm64/
          tar -C dist -czf geist-linux-arm64.tar.gz geist-linux-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: geist-linux-arm64
          path: geist-linux-arm64.tar.gz

  macos-arm64:
    name: macos-arm64 (Accelerate/AMX)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install libomp
        run: brew install libomp
      # GEIST_STATIC_OMP=1 -> static libomp.a, so the binary depends only on
      # macOS system frameworks (Accelerate/libSystem, always present). macOS
      # cannot be fully static (Apple ships no static libSystem), so we strip
      # symbols post-link instead of -s (which macOS ld no longer supports).
      - name: Build
        run: make TARGET=mac-omp CC=clang GEIST_STATIC_OMP=1 bin/mac-omp/release/tools/geist
      - name: Strip symbols
        run: strip bin/mac-omp/release/tools/geist
      - name: Verify deps + runs
        run: |
          otool -L bin/mac-omp/release/tools/geist
          bin/mac-omp/release/tools/geist --version
          ls -l bin/mac-omp/release/tools/geist
      - name: Package
        run: |
          mkdir -p dist/geist-macos-arm64
          cp bin/mac-omp/release/tools/geist dist/geist-macos-arm64/
          cp README.md LICENSE dist/geist-macos-arm64/
          tar -C dist -czf geist-macos-arm64.tar.gz geist-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: geist-macos-arm64
          path: geist-macos-arm64.tar.gz

  release:
    name: attach artifacts to the Release
    needs: [linux-arm64, macos-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # `gh release upload` needs the Release to already exist; a pushed tag
        # alone is not a Release. Create it from the tag (auto-generated notes)
        # if absent, then attach the per-platform tarballs. Idempotent.
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
                 --title "geist ${GITHUB_REF_NAME}" --generate-notes --verify-tag
          gh release upload "${GITHUB_REF_NAME}" dist/*/*.tar.gz --repo "${GITHUB_REPOSITORY}" --clobber
